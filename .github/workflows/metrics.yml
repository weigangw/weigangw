name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Isometric commit calendar
        uses: weigangw/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: weigangw
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Languages and starred topics
        uses: weigangw/metrics@latest
        with:
          filename: metrics.languages-topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: weigangw
          base: ""
          config_order: languages, topics
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_limit: 12
